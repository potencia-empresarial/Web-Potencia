[build]
  publish = "."

# Nota sobre redirect del subdomain de Netlify:
# Netlify NO permite redirigir el propio subdomain .netlify.app vía netlify.toml.
# Sin embargo, Netlify añade automáticamente un <link rel="canonical"> apuntando
# al primary domain (potenciaempresarial.site), que es la solución estándar para SEO.
# Google y otros buscadores respetan el canonical y solo indexan el dominio oficial.

# Proxy para el backend de Render
[[redirects]]
  from = "/api/*"
  to = "https://potencia-api.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
