[build]
  publish = "."

# Redirige el subdomain de Netlify al dominio oficial (SEO + branding)
# Usa "conditions" para hacer match por hostname (sintaxis correcta de Netlify)
[[redirects]]
  from = "/*"
  to = "https://potenciaempresarial.site/:splat"
  status = 301
  force = true
  conditions = {Host = ["potenciaempresarial.netlify.app"]}

# Proxy para el backend de Render
[[redirects]]
  from = "/api/*"
  to = "https://potencia-api.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
